log_format origin_log '[$time_local] "$request" $status '
                      '$body_bytes_sent "$http_user_agent" '
                      'cache_test_id=$request_id';

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    access_log /var/log/nginx/access.log origin_log;

    # Add a header so you can confirm responses came from the origin
    add_header X-Origin-Server "Otter-Origin" always;
    add_header X-Request-Id $request_id always;

    # Index page - short cache lifetime, good for testing freshness
    location = / {
        add_header Cache-Control "public, max-age=10" always;
        add_header X-Origin-Server "nginx-origin-1" always;
        try_files /index.html =404;
    }

    # HTML - moderate cache
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=60" always;
        add_header X-Origin-Server "nginx-origin-1" always;
    }

    # Static assets - long cache, immutable-style
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header X-Origin-Server "nginx-origin-1" always;
    }

    # Images - long cache
    location ~* \.(png|jpg|jpeg|gif|svg|ico)$ {
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Origin-Server "nginx-origin-1" always;
    }

    # "API" - JSON responses with no-cache, for testing bypass behavior
    location /api/no-cache/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Origin-Server "nginx-origin-1" always;
        add_header Content-Type "application/json" always;
    }

    # "API" - JSON with a short private cache, useful boundary case
    location /api/private/ {
        add_header Cache-Control "private, max-age=30" always;
        add_header X-Origin-Server "nginx-origin-1" always;
        add_header Content-Type "application/json" always;
    }

    # "API" - JSON cacheable
    location /api/public/ {
        add_header Cache-Control "public, max-age=30" always;
        add_header X-Origin-Server "nginx-origin-1" always;
        add_header Content-Type "application/json" always;
    }

    # Endpoint that always returns the current time - useful to verify caching works
    location = /now {
        default_type text/plain;
        add_header Cache-Control "public, max-age=15" always;
        add_header X-Origin-Server "nginx-origin-1" always;
        return 200 "origin time: $time_iso8601\nrequest id: $request_id\n";
    }

    # Slow endpoint - simulates slow origin via limit_rate, good for testing concurrency / coalescing
    location = /slow {
        default_type text/plain;
        add_header Cache-Control "public, max-age=20" always;
        add_header X-Origin-Server "nginx-origin-1" always;
        # Serve a small file at 10 bytes/sec to simulate a slow origin response
        limit_rate 10;
        try_files /slow.txt =500;
    }

    # 404 example
    location = /missing {
        return 404 "not here\n";
    }

    # Health check
    location = /health {
        access_log off;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }
}
